name: Deploy Flutter Frontend

on:
  push:
    paths:
      - "flutter_frontend/**"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter_frontend

    steps:
      # -------------------------
      # Checkout Repo
      # -------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------
      # Setup Flutter
      # -------------------------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # -------------------------
      # Enable Web
      # -------------------------
      - name: Enable Flutter Web
        run: flutter config --enable-web

      # -------------------------
      # Install Dependencies
      # -------------------------
      - name: Install Dependencies
        run: flutter pub get

      # -------------------------
      # Build Flutter Web
      # -------------------------
      - name: Build Flutter Web
        run: flutter build web --release --base-href "/AI-Brand-Analyzer/"

      # -------------------------
      # Deploy GitHub Pages
      # -------------------------
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: flutter_frontend/build/web
          force_orphan: true

      # -------------------------
      # Install Vercel CLI
      # -------------------------
      - name: Install Vercel CLI
        run: npm install -g vercel

      # -------------------------
      # Pull Vercel Project Settings
      # -------------------------
      - name: Pull Vercel Environment
        run: |
          vercel pull --yes \
          --environment=production \
          --token=${{ secrets.VERCEL_TOKEN }}

      # -------------------------
      # Build Vercel Project
      # -------------------------
      - name: Build Vercel Project
        run: |
          vercel build \
          --prod \
          --token=${{ secrets.VERCEL_TOKEN }}

      # -------------------------
      # Deploy to Vercel
      # -------------------------
      - name: Deploy to Vercel
        run: |
          vercel deploy \
          --prebuilt \
          --prod \
          --token=${{ secrets.VERCEL_TOKEN }}
