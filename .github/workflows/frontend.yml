name: Flutter Web Frontend Deploy

on:
  push:
    branches:
      - main
    paths:
      - "flutter_frontend/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter_frontend

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter config --enable-web

      - run: flutter pub get

      - run: flutter build web --release

      - run: echo "Frontend Build Successful"
